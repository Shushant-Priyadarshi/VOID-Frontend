<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Void — The Community for Doctors & Medical Students</title>
    <meta name="description" content="Void is a social platform built for doctors, residents, and medical students. Share anonymously, ask questions, find mentors, and connect with peers who understand the journey." />
    <meta name="keywords" content="medical community, doctors social network, medical students, anonymous medical posts, find medical mentor, NEET, MBBS, residency, healthcare professionals" />
    <meta name="author" content="Void" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://void.minutematters.in/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Void" />
    <meta property="og:title" content="Void — The Community for Doctors & Medical Students" />
    <meta property="og:description" content="Share anonymously, ask questions, find mentors, and connect with peers who understand the medical journey. Built for doctors, residents, and medical aspirants." />
    <meta property="og:url" content="http://localhost:5173" />
    <meta property="og:image" content="http://localhost:5173/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Void — Medical Community Platform" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Void — The Community for Doctors & Medical Students" />
    <meta name="twitter:description" content="Share anonymously, ask questions, find mentors, and connect with peers who understand the medical journey." />
    <meta name="twitter:image" content="http://localhost:5173/og-image.png" />
    <meta name="twitter:image:alt" content="Void — Medical Community Platform" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA / mobile -->
    <meta name="theme-color" content="#0d7377" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Void" />

    <!-- Structured data — Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Void",
      "url": "http://localhost:5173",
      "description": "A social community platform for doctors, residents, and medical students in India.",
      "logo": "https://yourdomain.com/og-image.png"
    }
    </script>

    <!-- Structured data — WebSite (enables sitelinks search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Void",
      "url": "http://localhost:5173",
      "description": "Social platform for doctors and medical students"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
